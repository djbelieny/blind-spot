version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env.production
    networks:
      - default
      - bcd-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=bcd-network"
      - "traefik.http.routers.blindspot.entrypoints=websecure"
      - "traefik.http.routers.blindspot.rule=Host(`blindspot.07labs.com`)"
      - "traefik.http.routers.blindspot.tls.certresolver=letsencrypt"
      - "traefik.http.routers.blindspot.middlewares=blindspot-headers"
      - "traefik.http.middlewares.blindspot-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.services.blindspot.loadbalancer.server.port=3000"
    volumes:
      - lesson_videos:/data/lesson-videos
    depends_on:
      - redis
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  qdrant_data:
  redis_data:
  lesson_videos:

networks:
  bcd-network:
    external: true
